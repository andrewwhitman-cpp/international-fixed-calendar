<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var k = 'my-calendar-theme'
        try {
          var s = localStorage.getItem(k)
          var t =
            s === 'light' || s === 'dark'
              ? s
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore the International Fixed Calendar: thirteen 28-day months, intercalary days, month view, Gregorian ↔ IFC date conversion, FAQs, and why a fixed calendar matters."
    />
    <meta
      name="keywords"
      content="International Fixed Calendar, IFC, 13 month calendar, 28 day month, calendar reform, Gregorian calendar, intercalary days, Addus, fixed calendar"
    />
    <link rel="canonical" href="/" />
    <meta name="theme-color" content="#f0ebe3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161514" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="International Fixed Calendar" />
    <meta
      property="og:description"

    />

    <meta

    />
    <title>International Fixed Calendar — 13 × 28 + year days</title>
